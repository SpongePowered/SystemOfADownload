test-resources:
    containers:
        postgres:
            image-name: postgres:15
            username: testuser
            password: testpassword
            db-name: testdb
            port: 7654
liquibase:
    enabled: true
    datasources:
        default:
            change-log: 'classpath:db/test-changelog.xml'
datasources:
  default:
    username: testuser
    password: testpassword
    url: 'jdbc:tc:postgresql:15:///postgres'
    driver-class-name: 'org.testcontainers.jdbc.ContainerDatabaseDriver'
endpoints:
    liquibase:
        enabled: true
        sensitive: false
micronaut:
    environment: test
    http:
        client:
            read-timeout: 5m
