version: "2"

linters:
  default: standard
  enable:
    - bodyclose
    - copyloopvar
    - errcheck
    - errorlint
    - gocritic
    - gosec
    - govet
    - ineffassign
    - misspell
    - nilerr
    - staticcheck
    - unconvert
    - unparam
    - unused
  settings:
    gocritic:
      enabled-tags:
        - diagnostic
        - style
        - performance
      disabled-checks:
        - exitAfterDefer  # expected in devtest CLI tools
    errorlint:
      errorf: true
      asserts: true
      comparison: true
    gosec:
      excludes:
        - G115  # integer overflow int->int32, validated upstream
        - G204  # subprocess with variable args, expected for git commands
        - G301  # directory perms 0755 are fine
        - G304  # file inclusion via variable, fine for test helpers
        - G306  # file perms 0644 are fine
    govet:
      enable-all: true
      disable:
        - fieldalignment
        - shadow

formatters:
  enable:
    - gofmt
    - goimports

issues:
  max-issues-per-linter: 50
  max-same-issues: 5
